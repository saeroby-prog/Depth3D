name: Build Depth3D APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Install Gradle 8.4 directly from distribution ─────────────────
      # gradlew requires gradle-wrapper.jar which is a binary file not in git.
      # Solution: download the full Gradle 8.4 binary and use it directly.
      - name: Install Gradle 8.4
        run: |
          GRADLE_VERSION=8.4
          echo "Downloading Gradle ${GRADLE_VERSION}..."
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          chmod +x /tmp/gradle-${GRADLE_VERSION}/bin/gradle
          echo "/tmp/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          echo "Gradle installed:"
          /tmp/gradle-${GRADLE_VERSION}/bin/gradle --version

      # ── 5. Generate debug keystore ────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore keystore/debug.keystore \
            -storepass android \
            -dname "CN=Depth3D Debug, O=Debug, C=KR" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9999

      # ── 6. Build Release APK using gradle binary directly ─────────────────
      # Using 'gradle' command (not gradlew) to avoid gradle-wrapper.jar dependency
      - name: Build Release APK
        run: |
          gradle assembleRelease --no-daemon --no-build-cache --stacktrace

      # ── 7. List generated APK files ───────────────────────────────────────
      - name: List APK files
        run: find . -name "*.apk" -type f | sort

      # ── 8. Get version info ───────────────────────────────────────────────
      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          echo "version_name=${VERSION}" >> $GITHUB_OUTPUT
          echo "APK version: $VERSION"

      # ── 9. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Depth3D-v${{ steps.version.outputs.version_name }}-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 10. Create GitHub Release on version tag ──────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: "Depth3D ${{ steps.version.outputs.version_name }}"
          body_path: CHANGELOG.md
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
